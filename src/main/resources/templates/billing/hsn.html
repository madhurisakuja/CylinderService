<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <title>HSN Codes</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { margin:0; font-family:Arial,Helvetica,sans-serif; background:#f4f4f4; }
        .topnav { overflow:hidden; background:#333; }
        .topnav a { float:left; color:#f2f2f2; padding:14px 16px; text-decoration:none; font-size:17px; }
        .topnav a:hover { background:#ddd; color:black; }
        .topnav a.active { background:#04AA6D; color:white; }
        .content { padding:24px; max-width:750px; margin:0 auto; }
        h2 { color:#333; border-bottom:2px solid #04AA6D; padding-bottom:8px; }
        .card { background:white; border-radius:8px; padding:20px; box-shadow:0 1px 4px rgba(0,0,0,.08); }
        table { width:100%; border-collapse:collapse; }
        th { background:#04AA6D; color:white; padding:10px 12px; text-align:left; font-size:13px; }
        td { padding:8px 10px; border-bottom:1px solid #eee; vertical-align:middle; }
        input[type=text] { padding:7px 10px; border:1px solid #ccc; border-radius:4px; font-size:13px; }
        .btn { padding:7px 16px; border:none; border-radius:4px; cursor:pointer; font-size:13px; font-weight:bold; }
        .btn-green { background:#04AA6D; color:white; }
        .btn-green:hover { background:#038a57; }
        .msg-success { background:#d4edda; color:#155724; padding:12px; border-radius:4px; margin-bottom:16px; }
        .note { font-size:12px; color:#888; margin-top:12px; }
    </style>
</head>
<body>
<div class="topnav">
    <a th:href="@{/newhome}">Home</a>
    <a th:href="@{/newCylinderEntryF}">New Entry</a>
    <a th:href="@{/billing/generate}">Generate Bill</a>
    <a th:href="@{/billing/party-accounts}">Party Accounts</a>
    <a th:href="@{/billing/prices}">Prices</a>
    <a class="active" th:href="@{/billing/hsn}">HSN Codes</a>
    <a th:href="@{/billing/counter}">Invoice Counter</a>
</div>
<div class="content">
    <h2>Update HSN Codes</h2>
    <div th:if="${hsnSuccess}" class="msg-success" th:text="${hsnSuccess}"></div>
    <div class="card">
        <table>
            <thead>
                <tr>
                    <th style="width:120px">Gas Type</th>
                    <th style="width:150px">HSN Code</th>
                    <th>Description</th>
                    <th style="width:80px"></th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="entry : ${hsnMap}">
                    <td><strong th:text="${entry.key}"></strong></td>
                    <td colspan="3">
                        <form th:action="@{/billing/hsn}" method="post"
                              style="display:flex;gap:8px;align-items:center">
                            <input type="hidden" name="gasType" th:value="${entry.key}"/>
                            <input type="text" name="hsnCode"
                                   th:value="${entry.value[0]}"
                                   placeholder="e.g. 28044090"
                                   style="width:130px"/>
                            <input type="text" name="description"
                                   th:value="${entry.value[1]}"
                                   placeholder="Description"
                                   style="width:220px"/>
                            <button type="submit" class="btn btn-green">Save</button>
                        </form>
                    </td>
                </tr>
            </tbody>
        </table>
        <p class="note">
            HSN codes are pre-seeded from your provided list. Update any entry and click Save.<br/>
            If left blank, the HSN column on the bill will be empty for manual entry.
        </p>
    </div>
</div>
</body>
</html>
