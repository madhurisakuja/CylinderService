<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <title>HSN Codes</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
         body{margin:0;font-family:Arial,Helvetica,sans-serif;background:#f4f4f4;}
        .topnav{overflow:hidden;background:#1a1a2e;}
        .topnav a{float:left;color:#eee;padding:14px 16px;text-decoration:none;font-size:15px;}
        .topnav a:hover{background:#16213e;color:#04AA6D;}
        .topnav a.active{background:#04AA6D;color:white;}
        .content{padding:24px;max-width:900px;margin:0 auto;}
        h2{color:#1a1a2e;border-bottom:2px solid #04AA6D;padding-bottom:8px;}
        h3{color:#555;margin-top:24px;}
        .card{background:white;border-radius:8px;padding:20px;margin-bottom:20px;box-shadow:0 1px 4px rgba(0,0,0,.08);}
        table{width:100%;border-collapse:collapse;}
        th{background:#04AA6D;color:white;padding:10px 12px;text-align:left;}
        td{padding:9px 12px;border-bottom:1px solid #eee;vertical-align:middle;}
        tr:last-child td{border-bottom:none;}
        input[type=text],select{padding:8px 12px;border:1px solid #ccc;border-radius:4px;font-size:14px;}
        .btn{padding:8px 18px;border:none;border-radius:4px;cursor:pointer;font-size:13px;font-weight:bold;}
        .btn-green{background:#04AA6D;color:white;} .btn-green:hover{background:#038a57;}
        .btn-red{background:#cc0000;color:white;}   .btn-red:hover{background:#990000;}
        .msg-success{background:#d4edda;color:#155724;padding:12px;border-radius:4px;margin-bottom:16px;}
        .inline{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
        .hint{font-size:12px;color:#888;margin-top:8px;}
    </style>
</head>
<body>
<div class="topnav">
    <a th:href="@{/newhome}">Home</a>
    <a th:href="@{/billing/generate}">Billing</a>
    <a th:href="@{/billing/custom-template}">Custom Template</a>
    <a th:href="@{/billing/party-accounts}">Party Accounts</a>
    <a th:href="@{/billing/prices}">Prices</a>
    <a th:href="@{/billing/labels}">Labels</a>
    <a class="active" th:href="@{/billing/hsn}">HSN</a>
    <a th:href="@{/billing/counter}">Invoice Counter</a>
</div>
<div class="content">
    <h2>Update HSN Codes</h2>
    <div th:if="${hsnSuccess}" class="msg-success" th:text="${hsnSuccess}"></div>
    <div class="card">
        <table>
            <thead>
                <tr>
                    <th style="width:120px">Gas Type</th>
                    <th style="width:150px">HSN Code</th>
                    <th>Description</th>
                    <th style="width:80px"></th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="entry : ${hsnMap}">
                    <td><strong th:text="${entry.key}"></strong></td>
                    <td colspan="3">
                        <form th:action="@{/billing/hsn}" method="post"
                              style="display:flex;gap:8px;align-items:center">
                            <input type="hidden" name="gasType" th:value="${entry.key}"/>
                            <input type="text" name="hsnCode"
                                   th:value="${entry.value[0]}"
                                   placeholder="e.g. 28044090"
                                   style="width:130px"/>
                            <input type="text" name="description"
                                   th:value="${entry.value[1]}"
                                   placeholder="Description"
                                   style="width:220px"/>
                            <button type="submit" class="btn btn-green">Save</button>
                        </form>
                    </td>
                </tr>
            </tbody>
        </table>
        <p class="note">
            HSN codes are pre-seeded from your provided list. Update any entry and click Save.<br/>
            If left blank, the HSN column on the bill will be empty for manual entry.
        </p>
    </div>
</div>
</body>
</html>
