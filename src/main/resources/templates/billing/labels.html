<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <title>Cylinder Labels (Particulars)</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body{margin:0;font-family:Arial,Helvetica,sans-serif;background:#f4f4f4;}
        .topnav{overflow:hidden;background:#1a1a2e;}
        .topnav a{float:left;color:#eee;padding:14px 16px;text-decoration:none;font-size:15px;}
        .topnav a:hover{background:#16213e;color:#04AA6D;}
        .topnav a.active{background:#04AA6D;color:white;}
        .content{padding:24px;max-width:900px;margin:0 auto;}
        h2{color:#1a1a2e;border-bottom:2px solid #04AA6D;padding-bottom:8px;}
        h3{color:#555;margin-top:24px;}
        .card{background:white;border-radius:8px;padding:20px;margin-bottom:20px;box-shadow:0 1px 4px rgba(0,0,0,.08);}
        table{width:100%;border-collapse:collapse;}
        th{background:#04AA6D;color:white;padding:10px 12px;text-align:left;}
        td{padding:9px 12px;border-bottom:1px solid #eee;vertical-align:middle;}
        tr:last-child td{border-bottom:none;}
        input[type=text],select{padding:8px 12px;border:1px solid #ccc;border-radius:4px;font-size:14px;}
        .btn{padding:8px 18px;border:none;border-radius:4px;cursor:pointer;font-size:13px;font-weight:bold;}
        .btn-green{background:#04AA6D;color:white;} .btn-green:hover{background:#038a57;}
        .btn-red{background:#cc0000;color:white;}   .btn-red:hover{background:#990000;}
        .msg-success{background:#d4edda;color:#155724;padding:12px;border-radius:4px;margin-bottom:16px;}
        .inline{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
        .hint{font-size:12px;color:#888;margin-top:8px;}
    </style>
</head>
<body>
<div class="topnav">
    <a th:href="@{/newhome}">Home</a>
    <a th:href="@{/newEntryF}">New Entry</a>
    <a th:href="@{/purchaseEntryF}">Purchase</a>
    <a th:href="@{/historyHolding}">History</a>
    <a th:href="@{/billing/generate}">Billing</a>
    <a th:href="@{/billing/party-accounts}">Party Accounts</a>
    <a th:href="@{/billing/prices}">Prices</a>
    <a class="active" th:href="@{/billing/labels}">Labels</a>
    <a th:href="@{/billing/hsn}">HSN</a>
    <a th:href="@{/billing/counter}">Counter</a>
</div>
<div class="content">
    <h2>Cylinder Particulars Labels</h2>
    <div th:if="${labelSuccess}" class="msg-success" th:text="${labelSuccess}"></div>

    <!-- Default labels -->
    <div class="card">
        <h3>Default Labels</h3>
        <p class="hint">These appear on the bill for all parties unless overridden below.</p>
        <table>
            <thead><tr><th>Gas Type</th><th>Current Label</th><th>Update</th></tr></thead>
            <tbody>
                <tr th:each="entry : ${defaultMap}">
                    <td><strong th:text="${entry.key}"></strong></td>
                    <td th:text="${entry.value}"></td>
                    <td>
                        <form th:action="@{/billing/labels/default}" method="post">
                            <div class="inline">
                                <input type="hidden" name="gasType" th:value="${entry.key}"/>
                                <input type="text" name="label" th:value="${entry.value}"
                                       style="width:200px" required/>
                                <button type="submit" class="btn btn-green">Update</button>
                            </div>
                        </form>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

    <!-- Party-specific override -->
    <div class="card">
        <h3>Set Party-Specific Label</h3>
        <form th:action="@{/billing/labels/party}" method="post">
            <div class="inline">
                <select name="partyName" required style="width:200px">
                    <option value="">-- Select Party --</option>
                    <option th:each="p : ${partyNames}" th:value="${p}" th:text="${p}"></option>
                </select>
                <select name="gasType" required style="width:130px">
                    <option value="">-- Gas Type --</option>
                    <option th:each="t : ${gasTypes}" th:value="${t}" th:text="${t}"></option>
                </select>
                <input type="text" name="label" placeholder="Label on bill" style="width:200px" required/>
                <button type="submit" class="btn btn-green">Set Label</button>
            </div>
        </form>
    </div>

    <!-- Existing overrides -->
    <div class="card" th:if="${not #lists.isEmpty(overrides)}">
        <h3>Party-Specific Overrides</h3>
        <table>
            <thead><tr><th>Party</th><th>Gas Type</th><th>Label</th><th></th></tr></thead>
            <tbody>
                <tr th:each="o : ${overrides}">
                    <td th:text="${o.partyName}"></td>
                    <td th:text="${o.gasType}"></td>
                    <td th:text="${o.label}"></td>
                    <td>
                        <form th:action="@{/billing/labels/party/delete}" method="post"
                              onsubmit="return confirm('Remove this override?')">
                            <input type="hidden" name="id" th:value="${o.id}"/>
                            <button type="submit" class="btn btn-red">Remove</button>
                        </form>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</div>
</body>
</html>
