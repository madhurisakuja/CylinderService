<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <title>Error</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { margin: 0; font-family: Arial, Helvetica, sans-serif; background: #f2f2f2; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .card { background: white; border-radius: 8px; padding: 48px 40px; max-width: 400px; text-align: center; }
        h2 { color: #cc0000; }
        a { color: #04AA6D; }
    </style>
</head>
<body>
<div class="card">
    <h2>Something went wrong</h2>
    <p th:text="${message}">An unexpected error occurred.</p>
    <br/>
    <a th:href="@{/newhome}">Return home</a>
</div>
</body>
</html>
