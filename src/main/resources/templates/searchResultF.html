<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <title>Search Results</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { margin: 0; font-family: Arial, Helvetica, sans-serif; }
        .topnav { overflow: hidden; background-color: #333; }
        .topnav a { float: left; color: #f2f2f2; text-align: center; padding: 14px 16px; text-decoration: none; font-size: 17px; }
        .topnav a:hover { background-color: #ddd; color: black; }
        .topnav a.active { background-color: #04AA6D; color: white; }
        .content { background-color: #f2f2f2; padding: 20px; }
        table { border-collapse: collapse; width: 100%; }
        td, th { border: 1px solid #ddd; padding: 8px; }
        tr:nth-child(even) { background-color: #f2f2f2; }
        tr:hover { background-color: #ddd; }
        th { padding-top: 12px; padding-bottom: 12px; text-align: left; background-color: #04AA6D; color: white; }
        .msg-error { color: #721c24; background-color: #f8d7da; padding: 10px; border-radius: 4px; margin-bottom: 8px; }
        a.export-link { display: inline-block; margin-bottom: 12px; color: #04AA6D; font-weight: bold; }
    </style>
</head>
<body>
<div class="topnav">
    <a th:href="@{/newhome}">Home</a>
    <a th:href="@{/newCylinderEntryF}">Make a new Entry</a>
    <a class="active" th:href="@{/CylinderHistoryF}">View History</a>
    <a th:href="@{/deleteCylinderEntryF}">Delete an Entry</a>
    <a th:href="@{/newPartyEntryF}">New Party Entry</a>
    <a th:href="@{/billing/generate}">Billing</a>
</div>

<div class="content">

    <!-- Error state -->
    <div th:if="${issueReadingData == true}" class="msg-error">
        There was a problem reading data.
        <span th:if="${cylinderNo != null}">Cylinder: <strong th:text="${cylinderNo}"></strong></span>
    </div>

    <!-- Normal: cylinder history -->
    <div th:if="${issueReadingData == false and inRotationResult != true}">
        <h2>History for cylinder <span th:text="${cylinderNo}"></span></h2>
        <a class="export-link" th:href="@{/exportF(cylinderNo=${cylinderNo})}">Export to CSV</a>
        <table>
            <thead>
                <tr>
                    <th>Date</th>
                    <th>Cylinder Type</th>
                    <th>Customer Name</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="row : ${history}">
                    <td th:text="${#dates.format(row.get(0), 'dd-MM-yyyy')}"></td>
                    <td th:text="${row.get(1)}"></td>
                    <td th:text="${row.get(2)}"></td>
                </tr>
            </tbody>
        </table>
    </div>

    <!-- Not-in-rotation results -->
    <div th:if="${issueReadingData == false and inRotationResult == true}">
        <h2>Cylinders not in rotation since
            <span th:text="${#dates.format(offsetDate, 'dd-MM-yyyy')}"></span>
        </h2>
        <table>
            <thead>
                <tr>
                    <th>Cylinder Number</th>
                    <th>Last Seen</th>
                    <th>Cylinder Type</th>
                    <th>Customer Name</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="row : ${history}">
                    <td th:text="${row.get(0)}"></td>
                    <td th:text="${#dates.format(row.get(1), 'dd-MM-yyyy')}"></td>
                    <td th:text="${row.get(2)}"></td>
                    <td th:text="${row.get(3)}"></td>
                </tr>
            </tbody>
        </table>
    </div>

</div>
</body>
</html>
