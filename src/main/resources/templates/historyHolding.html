<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <title>History — Holding View</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body{margin:0;font-family:Arial,Helvetica,sans-serif;background:#f4f4f4;}
        .topnav{overflow:hidden;background:#1a1a2e;}
        .topnav a{float:left;color:#eee;padding:14px 16px;text-decoration:none;font-size:15px;}
        .topnav a:hover{background:#16213e;color:#04AA6D;}
        .topnav a.active{background:#04AA6D;color:white;}
        .content{padding:24px;max-width:1100px;margin:0 auto;}
        .tab-row{display:flex;gap:0;margin-bottom:20px;border-bottom:2px solid #04AA6D;}
        .tab{padding:10px 24px;font-size:14px;font-weight:bold;color:#888;border-radius:6px 6px 0 0;text-decoration:none;}
        .tab.active{background:#04AA6D;color:white;}
        .tab:hover:not(.active){background:#e8f5e9;color:#04AA6D;}
        .filter-card{background:white;border-radius:8px;padding:16px 20px;box-shadow:0 1px 4px rgba(0,0,0,.07);margin-bottom:20px;}
        .filter-grid{display:grid;grid-template-columns:1fr 160px 160px auto;gap:12px;align-items:end;}
        label{font-size:12px;font-weight:bold;color:#666;display:block;margin-bottom:4px;}
        input[type=text],input[type=date],select{padding:9px 12px;border:1px solid #ccc;border-radius:4px;font-size:14px;width:100%;box-sizing:border-box;}
        .btn{padding:10px 20px;border:none;border-radius:4px;cursor:pointer;font-size:14px;font-weight:bold;background:#04AA6D;color:white;}
        .btn:hover{background:#038a57;}
        .btn-ghost{background:white;border:1px solid #ccc;color:#555;}
        .btn-ghost:hover{background:#f5f5f5;}
        table{width:100%;border-collapse:collapse;background:white;border-radius:8px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.07);margin-bottom:20px;}
        th{background:#04AA6D;color:white;padding:10px 14px;text-align:left;font-size:13px;}
        td{padding:9px 14px;border-bottom:1px solid #eee;font-size:13px;}
        tr:last-child td{border-bottom:none;}
        .pos{color:#04AA6D;font-weight:bold;} .neg{color:#cc0000;font-weight:bold;} .zero{color:#aaa;}
        .section-label{font-size:13px;font-weight:bold;color:#04AA6D;margin:16px 0 6px;text-transform:uppercase;letter-spacing:.5px;}
        h2{color:#1a1a2e;margin-bottom:4px;}
        .export-link{font-size:13px;color:#04AA6D;text-decoration:none;margin-left:12px;}
        .range-badge{font-size:12px;color:#888;margin-bottom:12px;}
    </style>
</head>
<body>
<div class="topnav">
    <a th:href="@{/newhome}">Home</a>
    <a th:href="@{/newEntryF}">New Entry</a>
    <a th:href="@{/purchaseEntryF}">Purchase</a>
    <a th:href="@{/cylinderNumbers}">Cyl. Numbers</a>
    <a class="active" th:href="@{/historyHolding}">History</a>
    <a th:href="@{/deleteEntryF}">Delete</a>
    <a th:href="@{/newPartyEntryF}">Parties</a>
    <a th:href="@{/billing/generate}">Billing</a>
</div>
<div class="content">
    <h2>History</h2>
    <div class="tab-row">
        <a class="tab active" th:href="@{/historyHolding}">Holding View</a>
        <a class="tab" th:href="@{/historyDetail}">Detail View</a>
        <a class="tab" th:href="@{/historyDaily}">Daily Report</a>
    </div>

    <div class="filter-card">
        <form th:action="@{/historyHolding}" method="get">
            <div class="filter-grid">
                <div>
                    <label>Party (blank = all parties)</label>
                    <input list="partyList" name="partyName" th:value="${selectedParty}"
                           placeholder="Type or select…" autocomplete="off"/>
                    <datalist id="partyList">
                        <option th:each="p : ${partyNames}" th:value="${p}"></option>
                    </datalist>
                </div>
                <div>
                    <label>From Date</label>
                    <input type="date" name="fromDate" th:value="${fromDate}"/>
                </div>
                <div>
                    <label>To Date</label>
                    <input type="date" name="toDate" th:value="${toDate}"/>
                </div>
                <div style="display:flex;gap:8px">
                    <button type="submit" class="btn">View</button>
                    <a th:href="@{/historyHolding}" class="btn btn-ghost" style="text-decoration:none;padding:10px 14px">Clear</a>
                </div>
            </div>
        </form>
    </div>

    <!-- Date range active badge -->
    <div class="range-badge" th:if="${fromDate != null and !#strings.isEmpty(fromDate)}">
        Showing entries from <strong th:text="${fromDate}"></strong>
        to <strong th:text="${toDate}"></strong>
        <th:block th:if="${selectedParty != null and !#strings.isEmpty(selectedParty)}">
            — <a th:href="@{/exportF(partyName=${selectedParty})}" class="export-link">Export CSV</a>
        </th:block>
    </div>

    <!-- All-parties holding summary -->
    <div th:if="${holdingSummary != null}">
        <table>
            <thead><tr><th>Party</th><th>Gas Type</th><th>Holding</th></tr></thead>
            <tbody>
                <tr th:each="e : ${holdingSummary}">
                    <td>
                        <a th:href="@{/historyHolding(partyName=${e.partyName})}"
                           style="color:#04AA6D;text-decoration:none" th:text="${e.partyName}"></a>
                    </td>
                    <td th:text="${e.ctype}"></td>
                    <td th:text="${e.cholding}"
                        th:classappend="${e.cholding > 0 ? 'pos' : (e.cholding == 0 ? 'zero' : 'neg')}"></td>
                </tr>
            </tbody>
        </table>
    </div>

    <!-- Single party — entries per type, date DESC -->
    <div th:if="${byType != null}">
        <th:block th:each="typeEntry : ${byType}">
            <div class="section-label" th:text="${typeEntry.key}"></div>
            <table>
                <thead>
                    <tr><th>Date</th><th>Full Out</th><th>Empty Return</th><th>Holding</th><th>Remarks</th></tr>
                </thead>
                <tbody>
                    <tr th:each="e : ${typeEntry.value}">
                        <td th:text="${#dates.format(e.date,'dd-MM-yyyy')}"></td>
                        <td th:text="${e.cfull}"></td>
                        <td th:text="${e.cempty}"></td>
                        <td th:text="${e.cholding}"
                            th:classappend="${e.cholding > 0 ? 'pos' : (e.cholding == 0 ? 'zero' : 'neg')}"></td>
                        <td th:text="${e.remarks}"></td>
                    </tr>
                </tbody>
            </table>
        </th:block>
    </div>
</div>
</body>
</html>
