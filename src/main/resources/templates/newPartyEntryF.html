<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <title>New Party Entry</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { margin: 0; font-family: Arial, Helvetica, sans-serif; }
        .topnav { overflow: hidden; background-color: #333; }
        .topnav a { float: left; color: #f2f2f2; text-align: center; padding: 14px 16px; text-decoration: none; font-size: 17px; }
        .topnav a:hover { background-color: #ddd; color: black; }
        .topnav a.active { background-color: #04AA6D; color: white; }
        .content { background-color: #f2f2f2; padding: 20px; }
        input[type=text] { width: 40%; padding: 12px 20px; margin: 8px 0; border: 1px solid #ccc; box-sizing: border-box; border-radius: 4px; }
        input[type=submit] { background-color: #04AA6D; color: white; padding: 14px 20px; margin: 8px 0; border: none; cursor: pointer; }
        input[type=submit]:hover { background-color: #45a049; }
        .msg-success { color: #155724; background-color: #d4edda; padding: 10px; border-radius: 4px; margin-bottom: 10px; }
        .msg-error   { color: #721c24; background-color: #f8d7da; padding: 10px; border-radius: 4px; margin-bottom: 10px; }
    </style>
</head>
<body>
<div class="topnav">
    <a th:href="@{/newhome}">Home</a>
    <a th:href="@{/newCylinderEntryF}">Make a new Entry</a>
    <a th:href="@{/CylinderHistoryF}">View History</a>
    <a th:href="@{/deleteCylinderEntryF}">Delete an Entry</a>
    <a class="active" th:href="@{/newPartyEntryF}">New Party Entry</a>
</div>

<div class="content">
    <div th:if="${entrySuccess != null and entrySuccess}" class="msg-success">
        Successfully registered party: <strong th:text="${partyName}"></strong>
    </div>
    <div th:if="${entrySuccess != null and !entrySuccess}" class="msg-error">
        Duplicate party — already exists: <strong th:text="${partyName}"></strong>
    </div>

    <form th:action="@{/newPartyEntryF}" th:object="${entryParty}" method="post">
        <label>Party Name:</label><br/>
        <input type="text" th:field="*{partyName}" /><br/><br/>
        <input type="submit" value="SUBMIT"/>
    </form>
</div>
</body>
</html>
