<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <title>Delete Entry</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { margin: 0; font-family: Arial, Helvetica, sans-serif; }
        .topnav { overflow: hidden; background-color: #333; }
        .topnav a { float: left; color: #f2f2f2; text-align: center; padding: 14px 16px; text-decoration: none; font-size: 17px; }
        .topnav a:hover { background-color: #ddd; color: black; }
        .topnav a.active { background-color: #04AA6D; color: white; }
        .content { background-color: #f2f2f2; padding: 20px; }
        input[type=text], input[type=date], input[type=number], select { width: 40%; padding: 12px 20px; margin: 8px 0; border: 1px solid #ccc; box-sizing: border-box; border-radius: 4px; }
        input[type=submit] { background-color: #cc0000; color: white; padding: 14px 20px; margin: 8px 0; border: none; cursor: pointer; }
        input[type=submit]:hover { background-color: #990000; }
        .msg-success { color: #155724; background-color: #d4edda; padding: 10px; border-radius: 4px; margin-bottom: 8px; }
        .msg-error   { color: #721c24; background-color: #f8d7da; padding: 10px; border-radius: 4px; margin-bottom: 8px; }
    </style>
</head>
<body>
<div class="topnav">
    <a th:href="@{/newhome}">Home</a>
    <a th:href="@{/newCylinderEntryF}">Make a new Entry</a>
    <a th:href="@{/CylinderHistoryF}">View History</a>
    <a class="active" th:href="@{/deleteCylinderEntryF}">Delete an Entry</a>
    <a th:href="@{/newPartyEntryF}">New Party Entry</a>
    <a th:href="@{/billing/generate}">Billing</a>
</div>

<div class="content">
    <div th:if="${deleteSuccess != null and deleteSuccess}" class="msg-success">
        Entry deleted for cylinder <strong th:text="${CylinderNo}"></strong>
        on <strong th:text="${#dates.format(date, 'dd-MM-yyyy')}"></strong>.
    </div>
    <div th:if="${deleteSuccess != null and !deleteSuccess}" class="msg-error">
        Could not find an entry for cylinder <strong th:text="${CylinderNo}"></strong>
        on <strong th:text="${#dates.format(date, 'dd-MM-yyyy')}"></strong>. Nothing deleted.
    </div>

    <form th:action="@{/deleteCylinderEntryF}" th:object="${entry}" method="post">
        <label>Customer Name:</label><br/>
        <select th:field="*{customerName}">
            <option th:each="name : ${partyNames}" th:value="${name}" th:text="${name}"></option>
        </select><br/>

        <label>Date:</label><br/>
        <input type="date" th:field="*{date}"/><br/>

        <label>Cylinder Number:</label><br/>
        <input type="number" th:field="*{cylinderNo}"/><br/>

        <label>Cylinder Type:</label><br/>
        <select th:field="*{ctype}">
            <option th:each="t : ${types}" th:value="${t}" th:text="${t}"></option>
        </select><br/><br/>

        <input type="submit" value="DELETE"/>
    </form>
</div>
</body>
</html>
