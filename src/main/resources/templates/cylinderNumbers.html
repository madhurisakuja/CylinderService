<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <title>Cylinder Numbers</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="_csrf" th:content="${_csrf.token}"/>
    <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
    <style>
        body{margin:0;font-family:Arial,Helvetica,sans-serif;background:#f4f4f4;}
        .topnav{overflow:hidden;background:#1a1a2e;}
        .topnav a{float:left;color:#eee;padding:14px 16px;text-decoration:none;font-size:15px;}
        .topnav a:hover{background:#16213e;color:#04AA6D;}
        .topnav a.active{background:#04AA6D;color:white;}
        .content{padding:24px;max-width:960px;margin:0 auto;}
        h2{color:#1a1a2e;}
        .card{background:white;border-radius:10px;padding:24px;box-shadow:0 2px 8px rgba(0,0,0,.07);margin-bottom:16px;}
        label{display:block;font-size:13px;font-weight:bold;color:#555;margin-bottom:4px;}
        select,input[type=text],input[type=date],input[type=number]{padding:9px 12px;border:1px solid #ccc;border-radius:4px;font-size:14px;box-sizing:border-box;}
        .filter-row{display:grid;grid-template-columns:1fr 1fr auto;gap:12px;align-items:end;}
        .btn{padding:10px 22px;border:none;border-radius:4px;cursor:pointer;font-size:14px;font-weight:bold;}
        .btn-green{background:#04AA6D;color:white;}
        .btn-green:hover{background:#038a57;}
        .btn-blue{background:#1a73e8;color:white;}
        .btn-blue:hover{background:#1557b0;}
        .type-section{margin-bottom:20px;}
        .type-header{font-size:14px;font-weight:bold;background:#f0faf5;border-left:4px solid #04AA6D;padding:8px 12px;border-radius:0 4px 4px 0;margin-bottom:10px;}
        .type-header.empty-type{background:#fff8e1;border-left-color:#cc7000;}
        .cyl-row{display:grid;gap:10px;align-items:center;margin-bottom:8px;}
        .cyl-row.full-row{grid-template-columns:120px 180px 1fr;}
        .cyl-row.empty-row{grid-template-columns:120px 240px 1fr;}
        .cyl-label{font-size:13px;color:#555;font-weight:bold;}
        .warn-msg{color:#cc7000;font-size:12px;margin-top:2px;}
        .msg-success{background:#d4edda;color:#155724;padding:10px;border-radius:4px;margin-bottom:12px;}
        .msg-error{background:#f8d7da;color:#721c24;padding:10px;border-radius:4px;margin-bottom:12px;}
        .hint{font-size:12px;color:#888;text-align:center;padding:20px;}
        #result-area{display:none;}
    </style>
</head>
<body>
<div class="topnav">
    <a th:href="@{/newhome}">Home</a>
    <a th:href="@{/newEntryF}">New Entry</a>
    <a th:href="@{/purchaseEntryF}">Purchase</a>
    <a class="active" th:href="@{/cylinderNumbers}">Cylinder Numbers</a>
    <a th:href="@{/historyHolding}">History</a>
    <a th:href="@{/deleteEntryF}">Delete</a>
    <a th:href="@{/newPartyEntryF}">Parties</a>
    <a th:href="@{/billing/generate}">Billing</a>
</div>
<div class="content">
    <h2>Cylinder Numbers</h2>
    <div class="card">
        <div class="filter-row">
            <div>
                <label>Date of Entry</label>
                <input type="date" id="filterDate" style="width:100%" th:value="${defaultDate}"/>
            </div>
            <div>
                <label>Party</label>

                <!--input list="partyNamesList" 
                id="filterParty" 
                placeholder="Type to search party..." 
                autocomplete="off" 
                required 
                onchange="checkValidParty()"/><br/>
         
                 <datalist id="partyNamesList">
                  <option th:each="name : ${partyNames}" th:value="${name}" th:text="${name}"></option>
                 </datalist-->
                 <select id="filterParty" style="width:100%">
                    <option value="">-- Select Party --</option>
                    <option th:each="p : ${partyNames}" th:value="${p}" th:text="${p}"></option>
                </select>
            </div>
            <div>
                <label>&nbsp;</label>
                <button class="btn btn-blue" onclick="loadEntries()">Load</button>
            </div>
        </div>
    </div>

    <div id="globalMessages"></div>
    <div class="hint" id="hintMsg">Select a party and date then click Load.</div>
    <div id="formsArea"></div>
</div>

<script>
const csrf      = () => document.querySelector('meta[name="_csrf"]').content;
const csrfHdr   = () => document.querySelector('meta[name="_csrf_header"]').content;

// slotData[slotKey] = { party, date, ctype, status, count, savedNos }
const slotData = {};

async function loadEntries() {
    const party = document.getElementById('filterParty').value.trim();
    const date  = document.getElementById('filterDate').value;
    if (!party || !date) { alert('Select both party and date.'); return; }

    const resp = await fetch(`/cylinderNumbers/load?partyName=${encodeURIComponent(party)}&date=${date}`, {
        headers: { [csrfHdr()]: csrf() }
    });
    if (!resp.ok) { alert('Failed to load entries. Check server logs.'); return; }
    const data = await resp.json();

    document.getElementById('hintMsg').style.display = 'none';
    document.getElementById('globalMessages').innerHTML = '';
    const area = document.getElementById('formsArea');
    area.innerHTML = '';

    if (!data.entries || !data.entries.length) {
        area.innerHTML = '<div class="hint">No bulk entries found for this party and date. Make a New Entry first.</div>';
        return;
    }

    for (const entry of data.entries) {
        const fullAtParty  = data.fullAtParty  && data.fullAtParty[entry.ctype]  ? data.fullAtParty[entry.ctype]  : [];
        const savedFull    = data.savedFull    && data.savedFull[entry.ctype]    ? data.savedFull[entry.ctype]    : [];
        const savedEmpty   = data.savedEmpty   && data.savedEmpty[entry.ctype]   ? data.savedEmpty[entry.ctype]   : [];

        if (entry.cfull > 0) {
            area.appendChild(buildSlot(party, entry.date, entry.ctype, 'FULL', entry.cfull,
                                       savedFull, fullAtParty));
        }
        if (entry.cempty > 0) {
            area.appendChild(buildSlot(party, entry.date, entry.ctype, 'EMPTY', entry.cempty,
                                       savedEmpty, fullAtParty));
        }
    }
}

function buildSlot(party, date, ctype, status, count, savedNos, fullAtParty) {
    const slotKey = `${ctype}|${status}`;
    slotData[slotKey] = { party, date, ctype, status, count, savedNos };

    const block = document.createElement('div');
    block.className = 'slot-block';
    block.id = `slot_${slotKey.replace('|','_')}`;

    const savedCount = savedNos.length;
    const headerClass = status === 'FULL' ? 'full' : 'empty';
    const dirLabel    = status === 'FULL' ? '▲ Full Out' : '▼ Empty Return';
    const statusLabel = savedCount > 0
        ? `<span class="saved-badge">${savedCount}/${count} saved</span>`
        : `<span class="slot-status">${count} needed</span>`;

    block.innerHTML = `
        <div class="slot-header ${headerClass}">
            <span>${ctype} — ${dirLabel} &nbsp;${statusLabel}</span>
            <button class="btn-save" onclick="saveSlot('${slotKey}')">Save ${ctype} ${status}</button>
        </div>
        <div class="slot-body" id="body_${slotKey.replace('|','_')}"></div>
    `;

    const body = block.querySelector('.slot-body');

    for (let i = 0; i < count; i++) {
        const rowId   = `inp_${ctype}_${status}_${i}`;
        const warnId  = `warn_${ctype}_${status}_${i}`;
        const preVal  = savedNos[i] != null ? savedNos[i] : '';
        const row     = document.createElement('div');
        row.className = 'cyl-row';

        if (status === 'EMPTY' && fullAtParty.length > 0) {
            // Dropdown of cylinders known to be FULL at this party
            const opts = fullAtParty.map(c =>
                `<option value="${c}" ${c == preVal ? 'selected' : ''}>${c}</option>`
            ).join('');
            row.innerHTML = `
                <span class="cyl-label">#${i+1}</span>
                <div>
                    <select id="${rowId}" onchange="handleEmptySelect(this,'${rowId}','${party}','${ctype}')">
                        <option value="">-- Select --</option>
                        ${opts}
                        <option value="__new__">Other…</option>
                    </select>
                    <input type="number" id="${rowId}_manual" placeholder="Enter cylinder no." min="1"
                           style="display:none;margin-top:6px;width:100%"
                           value="${preVal && !fullAtParty.includes(Number(preVal)) ? preVal : ''}"
                           oninput="checkWarn(this,'${party}','${ctype}','${warnId}')"/>
                    <div class="warn" id="${warnId}"></div>
                </div>
                <span></span>
            `;
            // If preVal was from "other", show manual input
            if (preVal && !fullAtParty.includes(Number(preVal))) {
                setTimeout(() => {
                    const sel = document.getElementById(rowId);
                    if (sel) sel.value = '__new__';
                    const man = document.getElementById(`${rowId}_manual`);
                    if (man) man.style.display = 'block';
                }, 0);
            }
        } else {
            row.innerHTML = `
                <span class="cyl-label">#${i+1}</span>
                <div>
                    <input type="number" id="${rowId}" placeholder="Cylinder No." min="1"
                           value="${preVal}" style="width:100%"
                           oninput="checkWarn(this,'${party}','${ctype}','${warnId}')"/>
                    <div class="warn" id="${warnId}"></div>
                </div>
                <span></span>
            `;
        }
        body.appendChild(row);
    }

    return block;
}

function handleEmptySelect(sel, rowId, party, ctype) {
    const manualId = `${rowId}_manual`;
    const manual = document.getElementById(manualId);
    if (sel.value === '__new__') {
        manual.style.display = 'block';
        document.getElementById(`warn_${rowId.replace('inp_','')}`).textContent =
            `⚠ This cylinder was not recorded as sent FULL to ${party}.`;
    } else {
        manual.style.display = 'none';
        document.getElementById(`warn_${rowId.replace('inp_','')}`).textContent = '';
    }
}

function checkWarn(input, party, ctype, warnId) {
    const w = document.getElementById(warnId);
    if (!w) return;
    w.textContent = input.value ? `⚠ Verify cylinder ${input.value} was sent FULL to ${party}.` : '';
}

async function saveSlot(slotKey) {
    const sd = slotData[slotKey];
    if (!sd) return;

    const { party, date, ctype, status, count } = sd;
    const rows = [];
    const seen = new Set();

    for (let i = 0; i < count; i++) {
        const rowId = `inp_${ctype}_${status}_${i}`;
        const el = document.getElementById(rowId);
        if (!el) continue;

        let val = '';
        if (el.tagName === 'SELECT') {
            val = el.value === '__new__'
                ? (document.getElementById(`${rowId}_manual`) || {value:''}).value.trim()
                : el.value;
        } else {
            val = el.value.trim();
        }
        if (!val || val === '0') continue;  // skip blanks

        const n = parseInt(val);
        if (isNaN(n) || n <= 0) continue;
        if (seen.has(n)) {
            showSlotMessage(slotKey, 'warn', `Duplicate cylinder ${n} in this batch — keeping first.`);
            continue;
        }
        seen.add(n);
        rows.push({ cylinderNo: String(n), partyName: party, ctype, date, status });
    }

    if (!rows.length) {
        showSlotMessage(slotKey, 'warn', 'No cylinder numbers entered — nothing saved.');
        return;
    }

    const btn = document.querySelector(`#slot_${slotKey.replace('|','_')} .btn-save`);
    if (btn) { btn.disabled = true; btn.textContent = 'Saving…'; }

    try {
        const resp = await fetch('/cylinderNumbers/save', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', [csrfHdr()]: csrf() },
            body: JSON.stringify(rows)
        });

        if (!resp.ok) {
            showSlotMessage(slotKey, 'error', `Server error ${resp.status}. Check logs.`);
            return;
        }

        const data = await resp.json();
        let html = '';
        if (data.saved > 0)
            html += `<div class="msg-success">✓ ${data.saved} cylinder(s) saved for ${ctype} ${status}.</div>`;
        if (data.warnings && data.warnings.length) {
            data.warnings.forEach(w => {
                if (w.startsWith('DUPLICATE_FULL:')) {
                    const p = w.split(':');
                    html += `<div class="msg-warn">⚠ Cylinder ${p[1]}: last status was also FULL.${p[2]?' Cylinders at party: '+p[2]:''}</div>`;
                } else if (w.startsWith('PARTY_MISMATCH:')) {
                    const p = w.split(':');
                    html += `<div class="msg-warn">⚠ Cylinder ${p[1]} was last with <b>${p[2]}</b>, being returned by <b>${p[3]}</b>.</div>`;
                } else {
                    html += `<div class="msg-warn">${w}</div>`;
                }
            });
        }

        // Update saved badge
        const badge = document.querySelector(`#slot_${slotKey.replace('|','_')} .saved-badge, #slot_${slotKey.replace('|','_')} .slot-status`);
        if (badge) {
            badge.className = 'saved-badge';
            badge.textContent = `${data.saved}/${sd.count} saved`;
        }

        // Show messages inside the slot
        const body = document.getElementById(`body_${slotKey.replace('|','_')}`);
        const msgDiv = document.createElement('div');
        msgDiv.innerHTML = html;
        body.prepend(msgDiv);

    } catch(e) {
        showSlotMessage(slotKey, 'error', 'Network error: ' + e.message);
    } finally {
        if (btn) { btn.disabled = false; btn.textContent = `Save ${ctype} ${status}`; }
    }
}

function showSlotMessage(slotKey, type, msg) {
    const body = document.getElementById(`body_${slotKey.replace('|','_')}`);
    if (!body) return;
    const div = document.createElement('div');
    div.className = type === 'error' ? 'msg-error' : 'msg-warn';
    div.textContent = msg;
    body.prepend(div);
}

// Submit filter on Enter from party or date inputs
document.addEventListener('keydown', function(e) {
    if (e.key !== 'Enter') return;
    const id = document.activeElement ? document.activeElement.id : '';
    if (id === 'filterParty' || id === 'filterDate') {
        e.preventDefault();
        loadEntries();
    }
});
</script>
</body>
</html>
