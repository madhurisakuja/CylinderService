<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <title>Sign In</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: Arial, Helvetica, sans-serif;
            background: #f2f2f2;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .card {
            background: white;
            border-radius: 8px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.1);
            padding: 48px 40px;
            width: 100%;
            max-width: 380px;
            text-align: center;
        }
        h1 { font-size: 22px; color: #333; margin-bottom: 8px; }
        p  { font-size: 14px; color: #777; margin-bottom: 32px; }
        .google-btn {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            background: white;
            border: 1px solid #ddd;
            border-radius: 4px;
            padding: 12px 24px;
            font-size: 15px;
            color: #444;
            text-decoration: none;
            cursor: pointer;
            transition: box-shadow 0.2s;
            width: 100%;
            justify-content: center;
        }
        .google-btn:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.15); }
        .google-icon { width: 20px; height: 20px; }
        .error {
            background: #f8d7da;
            color: #721c24;
            border-radius: 4px;
            padding: 10px 14px;
            font-size: 13px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
<div class="card">
    <h1>Cylinder Tracker</h1>
    <p>Sign in to continue</p>

    <div th:if="${param.error}" class="error">
        Access denied — your Google account is not authorised.<br/>
        Contact the administrator to get access.
    </div>

    <a href="/oauth2/authorization/google" class="google-btn">
        <!-- Google "G" logo SVG -->
        <svg class="google-icon" viewBox="0 0 48 48">
            <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
            <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
            <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
            <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
            <path fill="none" d="M0 0h48v48H0z"/>
        </svg>
        Sign in with Google
    </a>
</div>
</body>
</html>
