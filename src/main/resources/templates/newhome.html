<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <title>Home — Cylinder Tracker</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body{margin:0;font-family:Arial,Helvetica,sans-serif;background:#f4f4f4;}
        .topnav{overflow:hidden;background:#1a1a2e;}
        .topnav a{float:left;color:#eee;padding:14px 16px;text-decoration:none;font-size:15px;}
        .topnav a:hover{background:#16213e;color:#04AA6D;}
        .topnav a.active{background:#04AA6D;color:white;}
        .content{padding:24px;max-width:1100px;margin:0 auto;}
        h2{color:#1a1a2e;margin-bottom:4px;}
        .subtitle{color:#888;font-size:13px;margin-bottom:24px;}
        .holding-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:16px;}
        .party-card{background:white;border-radius:10px;padding:20px;box-shadow:0 2px 8px rgba(0,0,0,.07);}
        .party-name{font-size:16px;font-weight:bold;color:#1a1a2e;margin-bottom:12px;border-bottom:2px solid #04AA6D;padding-bottom:6px;}
        .type-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid #f0f0f0;font-size:14px;}
        .type-row:last-child{border-bottom:none;}
        .type-label{color:#555;}
        .holding-val{font-weight:bold;font-size:16px;}
        .holding-val.positive{color:#04AA6D;}
        .holding-val.zero{color:#aaa;}
        .holding-val.negative{color:#cc0000;}
        .empty-state{text-align:center;color:#aaa;padding:40px;font-size:15px;}
    </style>
</head>
<body>
<div class="topnav">
    <a class="active" th:href="@{/newhome}">Home</a>
    <a th:href="@{/newEntryF}">New Entry</a>
    <a th:href="@{/purchaseEntryF}">Purchase</a>
    <a th:href="@{/cylinderNumbers}">Cylinder Numbers</a>
    <a th:href="@{/historyHolding}">History</a>
    <a th:href="@{/deleteEntryF}">Delete</a>
    <a th:href="@{/newPartyEntryF}">Parties</a>
    <a th:href="@{/billing/generate}">Billing</a>
</div>
<div class="content">

                              th:text="${entry.cholding}"></span>
                    </div>
                </th:block>
            </div>
        </th:block>
    </div-->
</div>
</body>
</html>
